services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: nrs-mosquitto
    ports:
      - "${MQTT_PORT:-1883}:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-h", "localhost", "-p", "1883", "-t", "$$SYS/#", "-C", "1", "-W", "3"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  node-red:
    image: nodered/node-red:latest
    container_name: nrs-node-red
    ports:
      - "${NODE_RED_PORT:-1880}:1880"
    environment:
      - TZ=${TZ:-Europe/London}
      - NODE_RED_CREDENTIAL_SECRET=${NODE_RED_CREDENTIAL_SECRET:-change-me-locally}
    volumes:
      - ./node-red-data:/data
    depends_on:
      mosquitto:
        condition: service_healthy
    restart: unless-stopped
